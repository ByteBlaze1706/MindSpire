<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MindSpire</title>
  <!-- Google Fonts Outfit & Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom styles -->
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-card {
      max-width: 440px;
      margin: 10vh auto;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-cream">

  <div class="container">
    <div class="card wellness-card auth-card shadow-lg p-5 border-light-subtle">
      <div class="text-center mb-4">
        <span class="fs-1">🍀</span>
        <h2 class="h4 text-dark font-semibold mt-2">Welcome Back</h2>
        <p class="text-muted text-sm">Sign in to your secure wellness space</p>
      </div>

      <!-- Alert logs -->
      <div id="auth-alert" class="alert alert-danger d-none text-xs rounded-3" role="alert"></div>

      <form id="login-form" onsubmit="submitLogin(event)">
        <div class="mb-3">
          <label for="login-email" class="form-label text-muted text-xs font-bold uppercase" style="font-size: 10px;">Email Address</label>
          <input type="email" id="login-email" required class="form-control rounded-3 text-sm" placeholder="you@institution.edu" />
        </div>
        <div class="mb-4">
          <label for="login-password" class="form-label text-muted text-xs font-bold uppercase" style="font-size: 10px;">Password</label>
          <input type="password" id="login-password" required minlength="6" class="form-control rounded-3 text-sm" placeholder="••••••••" />
        </div>
        <button type="submit" id="submit-btn" class="btn btn-primary-wellness w-100 text-sm py-2.5">Sign In</button>
      </form>

      <div class="text-center mt-4 border-top pt-3">
        <span class="text-muted text-xs">New to MindSpire?</span>
        <a href="register.html" class="text-xs font-semibold text-decoration-none ms-1" style="color: var(--primary-color);">Create student account</a>
      </div>
    </div>
  </div>

  <!-- Client JavaScript -->
  <script src="js/auth.js"></script>
  <script>
    async function submitLogin(e) {
      e.preventDefault();
      const email = document.getElementById("login-email").value;
      const pass = document.getElementById("login-password").value;
      const alertDiv = document.getElementById("auth-alert");
      const btn = document.getElementById("submit-btn");

      alertDiv.classList.add("d-none");
      btn.disabled = true;
      btn.innerText = "Signing in...";

      try {
        await handleLogin(email, pass);
      } catch (err) {
        btn.disabled = false;
        btn.innerText = "Sign In";
        alertDiv.innerText = err.message;
        alertDiv.classList.remove("d-none");
      }
    }
  </script>
</body>
</html>

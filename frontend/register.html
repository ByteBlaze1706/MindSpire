<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - MindSpire</title>
  <!-- Google Fonts Outfit & Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom styles -->
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-card {
      max-width: 440px;
      margin: 8vh auto;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-cream">

  <div class="container">
    <div class="card wellness-card auth-card shadow-lg p-5 border-light-subtle">
      <div class="text-center mb-4">
        <span class="fs-1">🌱</span>
        <h2 class="h4 text-dark font-semibold mt-2">Create Account</h2>
        <p class="text-muted text-sm">Self-registration for institutional students</p>
      </div>

      <!-- Alert logs -->
      <div id="auth-alert" class="alert alert-danger d-none text-xs rounded-3" role="alert"></div>

      <form id="register-form" onsubmit="submitRegister(event)">
        <div class="mb-3">
          <label for="reg-email" class="form-label text-muted text-xs font-bold uppercase" style="font-size: 10px;">Institutional Email</label>
          <input type="email" id="reg-email" required class="form-control rounded-3 text-sm" placeholder="student@iitb.ac.in" />
          <div class="form-text text-muted" style="font-size: 9px;">Must match authorized university email domain.</div>
        </div>
        <div class="mb-3 row g-2">
          <div class="col-6">
            <label for="reg-first" class="form-label text-muted text-xs font-bold uppercase" style="font-size: 10px;">First Name</label>
            <input type="text" id="reg-first" class="form-control rounded-3 text-sm" placeholder="Jane" />
          </div>
          <div class="col-6">
            <label for="reg-last" class="form-label text-muted text-xs font-bold uppercase" style="font-size: 10px;">Last Name</label>
            <input type="text" id="reg-last" class="form-control rounded-3 text-sm" placeholder="Doe" />
          </div>
        </div>
        <div class="mb-3">
          <label for="reg-subdomain" class="form-label text-muted text-xs font-bold uppercase" style="font-size: 10px;">Institution Subdomain</label>
          <input type="text" id="reg-subdomain" required class="form-control rounded-3 text-sm" placeholder="e.g. iitb" />
        </div>
        <div class="mb-4">
          <label for="reg-password" class="form-label text-muted text-xs font-bold uppercase" style="font-size: 10px;">Password</label>
          <input type="password" id="reg-password" required minlength="6" class="form-control rounded-3 text-sm" placeholder="Min. 6 characters" />
        </div>
        <button type="submit" id="submit-btn" class="btn btn-primary-wellness w-100 text-sm py-2.5">Create Account</button>
      </form>

      <div class="text-center mt-4 border-top pt-3">
        <span class="text-muted text-xs">Already have an account?</span>
        <a href="login.html" class="text-xs font-semibold text-decoration-none ms-1" style="color: var(--primary-color);">Sign In</a>
      </div>
    </div>
  </div>

  <!-- Client JavaScript -->
  <script src="js/auth.js"></script>
  <script>
    async function submitRegister(e) {
      e.preventDefault();
      const email = document.getElementById("reg-email").value;
      const first = document.getElementById("reg-first").value;
      const last = document.getElementById("reg-last").value;
      const subdomain = document.getElementById("reg-subdomain").value;
      const pass = document.getElementById("reg-password").value;
      const alertDiv = document.getElementById("auth-alert");
      const btn = document.getElementById("submit-btn");

      alertDiv.classList.add("d-none");
      btn.disabled = true;
      btn.innerText = "Creating account...";

      try {
        await handleRegister(email, pass, subdomain, first, last);
      } catch (err) {
        btn.disabled = false;
        btn.innerText = "Create Account";
        alertDiv.innerText = err.message;
        alertDiv.classList.remove("d-none");
      }
    }
  </script>
</body>
</html>

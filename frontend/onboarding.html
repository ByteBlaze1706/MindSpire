<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding - MindSpire</title>
  <!-- Google Fonts Outfit & Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom styles -->
  <link rel="stylesheet" href="style.css">
  <style>
    .onboard-card {
      max-width: 520px;
      margin: 6vh auto;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-cream">

  <div class="container">
    <div class="card wellness-card onboard-card shadow-lg p-5 border-light-subtle">
      <div class="text-center mb-4">
        <span class="fs-1">🌈</span>
        <h2 class="h4 text-dark font-semibold mt-2">Personalize Your Experience</h2>
        <p class="text-muted text-sm">Configure your privacy, language, and notification alerts</p>
      </div>

      <form id="onboard-form" onsubmit="submitOnboarding(event)">
        <!-- Language selection -->
        <div class="mb-4">
          <label class="form-label text-muted text-xs font-bold uppercase" style="font-size: 10px; letter-spacing: 0.5px;">Preferred System Language</label>
          <select id="onboard-language" required class="form-select rounded-3 text-sm">
            <option value="English" selected>English</option>
            <option value="Hindi">Hindi (हिंदी)</option>
            <option value="Marathi">Marathi (मराठी)</option>
            <option value="Tamil">Tamil (தமிழ்)</option>
            <option value="Telugu">Telugu (తెలుగు)</option>
            <option value="Bengali">Bengali (বাংলা)</option>
            <option value="Gujarati">Gujarati (ગુજરાતી)</option>
          </select>
        </div>

        <!-- Privacy & consent flags -->
        <div class="mb-4 border-top pt-3">
          <label class="form-label text-muted text-xs font-bold uppercase" style="font-size: 10px; letter-spacing: 0.5px;">Privacy Share Consents</label>
          <div class="form-check form-switch mb-2 text-sm">
            <input class="form-check-input" type="checkbox" id="consent-journal" checked>
            <label class="form-check-label text-dark" for="consent-journal">Allow assigned counselors to view my wellness journals</label>
            <div class="form-text text-muted" style="font-size: 9px;">Encrypted journals will only be decrypted for verified clinical reviews.</div>
          </div>
          <div class="form-check form-switch text-sm">
            <input class="form-check-input" type="checkbox" id="consent-chat" checked>
            <label class="form-check-label text-dark" for="consent-chat">Allow assigned counselors to view my AI Companion logs</label>
            <div class="form-text text-muted" style="font-size: 9px;">Helps counselors review mood analytics and crisis alerts histories.</div>
          </div>
        </div>

        <!-- Notification preferences -->
        <div class="mb-4 border-top pt-3">
          <label class="form-label text-muted text-xs font-bold uppercase" style="font-size: 10px; letter-spacing: 0.5px;">Notifications Settings</label>
          <div class="form-check mb-2 text-sm">
            <input class="form-check-input" type="checkbox" id="notify-checkin" checked>
            <label class="form-check-label text-dark" for="notify-checkin">Send daily wellness check-in email reminders</label>
          </div>
          <div class="form-check text-sm">
            <input class="form-check-input" type="checkbox" id="notify-counselor" checked>
            <label class="form-check-label text-dark" for="notify-counselor">Send immediate alerts for counselor scheduled bookings</label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary-wellness w-100 text-sm py-2.5 mt-2">Save and Enter Dashboard</button>
      </form>
    </div>
  </div>

  <!-- Client JavaScript -->
  <script src="js/auth.js"></script>
  <script>
    // Enforce student session role checks on load
    window.onload = function() {
      const profile = checkAuthGuard("student");
      if (!profile) {
        // Redirected by guard if missing session
      }
    };

    function submitOnboarding(e) {
      e.preventDefault();
      
      const lang = document.getElementById("onboard-language").value;
      const consentJournal = document.getElementById("consent-journal").checked;
      const consentChat = document.getElementById("consent-chat").checked;
      
      const settings = {
        language: lang,
        consentJournal,
        consentChat
      };

      // Save choices temporarily under local session
      sessionStorage.setItem("onboard_settings", JSON.stringify(settings));

      // Redirect student to final dashboard portal
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>

# Spring Boot Application Settings
server.port=8080

# PostgreSQL Connection Config using Env Variables
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=public}
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Security Secrets & API keys
mindspire.jwt.secret=${JWT_SECRET:mindspire-super-secret-jwt-signing-key-value-for-security-filters}
mindspire.encryption.key=${MASTER_KEK:mindspire-super-secret-key-phrase}
mindspire.gemini.api-key=${GEMINI_API_KEY:mock-gemini-api-key}
mindspire.resend.api-key=${RESEND_API_KEY:mock-resend-key}
mindspire.cookie.secure=${COOKIE_SECURE:false}
